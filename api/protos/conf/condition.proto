syntax = "proto3";

package conf;

// 操作符枚举
enum Operator {
  //排序
  ORDER = 0;

  // 基本比较
  EQ = 1;        // =
  NEQ = 2;       // !=
  GT = 3;        // >
  GTE = 4;       // >=
  LT = 5;        // <
  LTE = 6;       // <=

  // 模糊 / 大小写不敏感模糊 / 非模糊
  LIKE = 7;      // SQL LIKE
  NOT_LIKE = 8;  // NOT LIKE

  // 集合操作
  IN = 9;       // IN (v1, v2, ...)
  NIN = 10;      // NOT IN

  // 空值判断
  IS_NULL = 11;      // IS NULL
  IS_NOT_NULL = 12;  // IS NOT NULL

  // 范围与正则
  BETWEEN = 13;   // BETWEEN a AND b（或服务端映射为 >=a AND <=b）
  REGEXP = 14;    // 正则匹配（DB/引擎支持）

  // 语义化的字符串操作
  CONTAINS = 15;     // 包含（等价于 LIKE %v%）
  STARTS_WITH = 16;  // 前缀（等价于 LIKE v%）
  ENDS_WITH = 17;    // 后缀（等价于 LIKE %v）
}

enum Sort {
  ASC = 0; // 升序
  DESC = 1; // 降序
}
